{% extends "layouts/app_base.html" %}

{% block body %}

<div class="row justify-content-center mt-5">
    <div class="col-12 col-md-8 col-lg-5">
        <div class="card shadow-sm">
            <div class="card-body p-4 p-lg-5">
                <h1 class="h3 text-center mb-2">{{ title }}</h1>
                <p class="text-muted text-center mb-4">Connectez-vous pour acceder a votre espace.</p>

                {% if user.is_authenticated %}
                    <div class="d-grid gap-2">
                        <a href="{% url 'accueil' %}" class="btn btn-primary">Entrer dans l'application</a>
                    </div>
                {% else %}
                    <form method="post" action="{% url 'login' %}">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="id_username" class="form-label">Nom d'utilisateur</label>
                            <input type="text" name="username" id="id_username" class="form-control" required autofocus>
                        </div>
                        <div class="mb-4">
                            <label for="id_password" class="form-label">Mot de passe</label>
                            <input type="password" name="password" id="id_password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Se connecter</button>
                    </form>
                {% endif %}
            </div>
        </div>
    </div>
</div>

{% endblock %}
