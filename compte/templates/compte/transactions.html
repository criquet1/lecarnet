<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transactions</title>
    <style>
        :root {
            --border: #d7dce3;
            --text: #1f2a37;
            --muted: #5b6472;
            --bg: #f5f7fb;
            --card: #ffffff;
            --accent: #0f6cbd;
            --accent-hover: #0b5a9d;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 24px;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text);
            background: linear-gradient(135deg, #eef3fb 0%, #f8fbff 100%);
        }

        .card {
            max-width: 980px;
            margin: 0 auto;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(22, 35, 57, 0.08);
        }

        h1 {
            margin-top: 0;
            margin-bottom: 16px;
            font-size: 1.35rem;
        }

        .row {
            display: grid;
            gap: 12px;
            margin-bottom: 12px;
        }

        .row-top {
            grid-template-columns: 1fr 1fr 2fr 1.5fr;
        }

        .line-items {
            display: grid;
            gap: 10px;
        }

        .line-item {
            display: grid;
            gap: 12px;
            grid-template-columns: 2fr 1fr 1fr;
        }

        input,
        select,
        button {
            width: 100%;
            min-height: 40px;
            border-radius: 8px;
            border: 1px solid var(--border);
            font-size: 0.95rem;
            padding: 0 12px;
            color: var(--text);
            background: #fff;
        }

        button {
            width: auto;
            border: 0;
            color: #fff;
            background: var(--accent);
            font-weight: 600;
            cursor: pointer;
            padding: 0 18px;
        }

        button:hover {
            background: var(--accent-hover);
        }

        .actions {
            display: flex;
            justify-content: flex-start;
            gap: 10px;
            margin-top: 8px;
        }

        @media (max-width: 880px) {
            .row-top,
            .line-item {
                grid-template-columns: 1fr;
            }

            body {
                padding: 14px;
            }

            .card {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Nouvelle transaction</h1>

        {% if messages %}
            {% for message in messages %}
                <div style="margin-bottom:10px;padding:10px 12px;border-radius:8px;border:1px solid #d7dce3;background:#f8fbff;">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="post" action="{% url 'transactions' %}">
            {% csrf_token %}
            <div class="row row-top">
                <div>
                    <input id="date_select" name="date_select" type="date" required>
                </div>

                <div>
                    <select id="compagnie" name="compagnie">
                        <option value="" selected disabled>Compagnie</option>
                        {% for compagnie in compagnies %}
                            <option value="{{ compagnie.id }}">{{ compagnie.nom }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div>
                    <input id="description" name="description" type="text" placeholder="Description de la transaction">
                </div>

                <div>
                    <input id="source" name="source" type="text" placeholder="Ex: Facture, banque, paie">
                </div>
            </div>

            <div id="line-items" class="line-items">
                <div class="line-item">
                    <div>
                        <input id="compte_1" name="comptes_comptables[]" type="text" placeholder="Ex: 1000 - Encaisse">
                    </div>

                    <div>
                        <input id="debit_1" name="montant_debit[]" type="text" placeholder="Montant débit">
                    </div>

                    <div>
                        <input id="credit_1" name="montant_credit[]" type="text" placeholder="Montant crédit">
                    </div>
                </div>
            </div>

            <div class="actions">
                <button type="button" id="add-line">Ajouter une autre ligne</button>
                <button type="submit" id="save-transaction">Sauvegarder la transaction</button>
            </div>
        </form>
    </div>

    <script>
        (function () {
            const lineItems = document.getElementById("line-items");
            const addLineButton = document.getElementById("add-line");
            let rowIndex = 1;

            addLineButton.addEventListener("click", function () {
                rowIndex += 1;

                const row = document.createElement("div");
                row.className = "line-item";
                row.innerHTML = [
                    '<div>',
                    '  <input id="compte_' + rowIndex + '" name="comptes_comptables[]" type="text" placeholder="Ex: 1000 - Encaisse">',
                    '</div>',
                    '<div>',
                    '  <input id="debit_' + rowIndex + '" name="montant_debit[]" type="text" placeholder="Montant débit">',
                    '</div>',
                    '<div>',
                    '  <input id="credit_' + rowIndex + '" name="montant_credit[]" type="text" placeholder="Montant crédit">',
                    '</div>'
                ].join('');

                lineItems.appendChild(row);
            });
        })();
    </script>
</body>
</html>
