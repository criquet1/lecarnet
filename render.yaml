services:
  - type: web
    name: lecarnet
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: python manage.py migrate && python manage.py migrate_tenants && gunicorn lecarnet.wsgi:application
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DEFAULT_DB_NAME
        sync: false
      - key: DEFAULT_DB_USER
        sync: false
      - key: DEFAULT_DB_PASSWORD
        sync: false
      - key: DEFAULT_DB_HOST
        sync: false
      - key: DEFAULT_DB_PORT
        value: "5432"